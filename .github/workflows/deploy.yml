# main 푸시 → 이미지 병렬 빌드(레지스트리 캐시) → Artifact Registry → 수집 VM 배포 + 매매 VM 메타데이터 갱신.
# 배포 검증은 deploy-collector-vm.sh의 이미지 revision(sha) 라벨 대조로 수행(공개 대시보드는 온디맨드라 별도 헬스체크 없음).
# 인증 = Workload Identity Federation(시크릿 저장 없음). 1회 인프라 셋업 = infra/setup-cicd.sh.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy          # 연속 머지 직렬화(최신 대기 런만 유지) — :latest 태그 경합 방지
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write        # WIF OIDC 토큰 발급

env:
  PROJECT: coin-auto-trader-jvfhgq
  ZONE: us-central1-a          # 수집 VM(coin-trader-vm, 상시)
  TRADE_ZONE: asia-northeast3-a  # 매매 VM(coin-trade-vm) — 서울 리전(us-central1 용량 고갈 회피, #266)
  AR: us-central1-docker.pkg.dev/coin-auto-trader-jvfhgq/docker

jobs:
  # 테스트 게이트 — 테스트를 통과해야 빌드·배포(빨간 코드의 프로드 VM 직행 차단).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -q -r requirements.txt -r requirements-ml.txt pytest
      - run: python -m pytest tests/ -q
      - name: import 스윕 + 프로덕션 경계 검사
        run: |
          python - <<'EOF'
          import importlib, pkgutil
          # KRX 계열은 import 시점에 KRX 로그인(네트워크)을 트리거 → CI에서 제외(수동/연구용).
          SKIP = {"batch.rawdata._krx_session", "batch.rawdata.krx", "batch.rawdata.krx_bulk",
                  "batch.rawdata.kr_index_membership", "batch.rawdata.kr_delisted"}
          fails = []
          for r in ("common", "streaming", "trading", "api", "batch", "scripts"):
              pkg = importlib.import_module(r)
              for m in pkgutil.walk_packages(pkg.__path__, r + "."):
                  if m.name in SKIP:
                      continue
                  try:
                      importlib.import_module(m.name)
                  except Exception as e:
                      fails.append(f"{m.name}: {type(e).__name__}: {e}")
          if fails:
              raise SystemExit("\n".join(fails))
          print("IMPORT SWEEP OK")
          EOF
          # 프로덕션 앱 이미지는 batch/ 제외 — 상시 경로의 batch.* import는 배포 후 즉사(CLAUDE.md 경계)
          if grep -rn --include='*.py' -E '^(from|import) batch' common streaming api trading \
             | grep -vE 'stock_trade_once|us_trade_once|stock_trade_common|kr_ichimoku_trade_once'; then
            echo '경계 위반: 프로덕션 상시 경로가 batch.*를 import'; exit 1
          fi
          echo "BOUNDARY OK"

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: quant-trader-app
            dockerfile: Dockerfile
          - name: quant-trader-batch
            dockerfile: Dockerfile.batch
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: coin-auto-trader-jvfhgq
          workload_identity_provider: projects/689150179824/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@coin-auto-trader-jvfhgq.iam.gserviceaccount.com
          token_format: access_token
      - uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.AR }}/${{ matrix.name }}:latest
            ${{ env.AR }}/${{ matrix.name }}:${{ github.sha }}
          # revision 라벨 = VM들의 신선도 검증 기준(startup build_flag / deploy-collector-vm.sh)
          labels: org.opencontainers.image.revision=${{ github.sha }}
          build-args: GIT_SHA=${{ github.sha }}
          # 레지스트리 캐시(GHA 캐시 10GB 쿼터·축출 무관) — pip 레이어 재사용으로 빌드 60~120s
          cache-from: type=registry,ref=${{ env.AR }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ env.AR }}/${{ matrix.name }}:buildcache,mode=max

  # 수집 VM: git reset 후 collector 프로파일 pull+up (deploy-collector-vm.sh가 sha 라벨 검증까지 수행)
  deploy-collector-vm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          project_id: coin-auto-trader-jvfhgq
          workload_identity_provider: projects/689150179824/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@coin-auto-trader-jvfhgq.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Check collector VM status
        id: vm
        run: |
          ST=$(gcloud compute instances describe coin-trader-vm --project "$PROJECT" --zone "$ZONE" --format='value(status)' 2>/dev/null || echo MISSING)
          echo "status=$ST" >> "$GITHUB_OUTPUT"
          echo "수집 VM 상태: $ST"
      # 수집 VM은 비용절감으로 평소 정지(코인 틱 파이프라인 라이브 매매 비필수). RUNNING일 때만 배포하고,
      # 정지 중이면 스킵 — 재가동 시 collector-vm-startup이 git reset + 최신 이미지 pull로 자체 최신화한다.
      - name: SSH deploy
        if: steps.vm.outputs.status == 'RUNNING'
        run: |
          for i in 1 2 3; do
            gcloud compute ssh coin-trader-vm --project "$PROJECT" --zone "$ZONE" --quiet --ssh-key-expire-after=10m \
              --command "sudo bash -c 'export GIT_SSH_COMMAND=\"ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null\"; git -C /opt/coin-auto-trader fetch origin main && git -C /opt/coin-auto-trader reset --hard origin/main && bash /opt/coin-auto-trader/infra/deploy-collector-vm.sh ${{ github.sha }}'" && exit 0
            echo "ssh 배포 재시도 $i"; sleep 20
          done
          exit 1
      - name: Skip notice
        if: steps.vm.outputs.status != 'RUNNING'
        run: echo "수집 VM이 RUNNING 아님(${{ steps.vm.outputs.status }}) — collector 배포 스킵. 재가동 시 startup이 최신 코드·이미지로 자체 최신화."

  # 매매 VM: 메타데이터 startup-script 갱신(TERMINATED/RUNNING 무관) — 다음 부팅부터 적용
  update-trade-vm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          project_id: coin-auto-trader-jvfhgq
          workload_identity_provider: projects/689150179824/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@coin-auto-trader-jvfhgq.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud compute instances add-metadata coin-trade-vm --project "$PROJECT" --zone "$TRADE_ZONE" \
            --metadata-from-file startup-script=infra/trade-vm-startup.sh

  # 어느 잡이든 실패 시 텔레그램 통보 — CI 실패가 GitHub 이메일에만 묻히지 않게 매매 알림과 채널 일원화.
  # (github-deployer SA에 telegram-env secretAccessor 1회 바인딩 필요 — DEPLOY.md CI/CD 절 참조)
  notify-failure:
    if: failure()
    needs: [test, build, deploy-collector-vm, update-trade-vm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          project_id: coin-auto-trader-jvfhgq
          workload_identity_provider: projects/689150179824/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@coin-auto-trader-jvfhgq.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: |
          gcloud secrets versions access latest --secret=telegram-env > .env
          pip install -q telethon python-dotenv
          python -m common.notify_telegram "🔴 CI deploy 실패 — ${GITHUB_SHA:0:7} / https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
