<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>coin-auto-trader</title>
<style>
  :root{                                   /* 다크(기본) — 시스테매틱 트레이딩 터미널 */
    --ink:#0b0e14; --panel:#12161f; --raise:#181d28; --line:#222a38; --line2:#2c3546;
    --text:#e9edf4; --muted:#7a8494; --faint:#4b5566;
    --up:#f6465d; --down:#4d8dff;                       /* 시장: 한국 관례(상승=빨강·하락=파랑) */
    --algo:#2dd4bf; --algo-deep:#0f9e8e; --algo-glow:rgba(45,212,191,.22); --cash:#5b6677;
    --bg-grad:radial-gradient(1200px 500px at 80% -10%, #131a26 0%, transparent 60%);
    --field:#0a0d13;
    --mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,"Segoe UI","Malgun Gothic",system-ui,sans-serif;
  }
  :root[data-theme="light"]{               /* 라이트 — 동일 아이덴티티(틸 알고리즘 색 유지), 종이 베이스 */
    --ink:#eef1f6; --panel:#ffffff; --raise:#f3f5f9; --line:#e1e6ef; --line2:#d2d9e6;
    --text:#161b26; --muted:#5d6675; --faint:#9aa4b4;
    --up:#dc2f49; --down:#2767d8;
    --algo:#0d9488; --algo-deep:#0f766e; --algo-glow:rgba(13,148,136,.16); --cash:#8b94a4;
    --bg-grad:radial-gradient(1100px 460px at 82% -12%, #e3ecf5 0%, transparent 60%);
    --field:#f6f8fb;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg-grad),var(--ink);color:var(--text);
    font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh;}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .up{color:var(--up);} .down{color:var(--down);} .muted{color:var(--muted);}

  header{display:flex;align-items:center;gap:24px;padding:14px 22px;border-bottom:1px solid var(--line);
    background:var(--panel);flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--algo);
    box-shadow:0 0 0 3px var(--algo-glow),0 0 14px var(--algo);}
  .brand b{font-size:15px;letter-spacing:.02em;font-weight:700;}
  .brand b span{color:var(--algo);}
  .kpi{display:flex;flex-direction:column;gap:2px;}
  .kpi .v{font-size:17px;font-weight:600;} .kpi .v.big{font-size:20px;}
  header .sp{flex:1;}
  .live{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .live.ok::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--algo);
    box-shadow:0 0 8px var(--algo);animation:pulse 2s infinite;}
  .live.err::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--up);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .icon-btn{background:var(--raise);border:1px solid var(--line);color:var(--text);width:34px;height:30px;
    border-radius:8px;cursor:pointer;font-size:15px;line-height:1;}
  .icon-btn:hover{border-color:var(--algo);}
  #logout{color:var(--muted);font-size:12px;text-decoration:none;}

  .stance{padding:18px 22px 4px;}
  .stance-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .stance-head .lbl{color:var(--algo);}
  .stance-head .sub{font-size:11px;color:var(--faint);}
  .rails{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;}
  .rail{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
  .rail.long{border-color:rgba(45,212,191,.4);}
  .rail-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:13px;}
  .rail-top .sym{font-size:15px;font-weight:700;letter-spacing:.02em;}
  .rail-top .price{font-size:14px;margin-left:auto;}
  .state{font-size:11px;font-weight:700;letter-spacing:.12em;padding:3px 9px;border-radius:5px;}
  .state.LONG{color:var(--ink);background:var(--algo);}
  .state.CASH{color:var(--cash);background:var(--raise);border:1px solid var(--line2);}
  .track{position:relative;height:30px;border-radius:7px;background:var(--field);border:1px solid var(--line);margin:6px 0 4px;}
  .ticks{position:absolute;inset:0;display:flex;justify-content:space-between;}
  .ticks i{width:1px;background:var(--line2);opacity:.7;}
  .fill{position:absolute;top:0;bottom:0;left:0;border-radius:7px 0 0 7px;width:0;
    background:linear-gradient(90deg,var(--algo-deep),var(--algo));box-shadow:0 0 18px var(--algo-glow);
    transition:width 1s cubic-bezier(.22,1,.36,1);}
  .thumb{position:absolute;top:-3px;bottom:-3px;width:2px;left:0;background:var(--text);
    box-shadow:0 0 8px var(--algo-glow);transition:left 1s cubic-bezier(.22,1,.36,1);}
  .wtxt{position:absolute;top:50%;left:10px;transform:translateY(-50%);font-size:12px;font-weight:700;color:#03110e;}
  .rail-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .ends{font-size:9px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;}
  .speeds{display:flex;gap:8px;}
  .spd{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
  .spd i{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--cash);}
  .spd.on i{background:var(--algo);border-color:var(--algo);box-shadow:0 0 6px var(--algo-glow);}
  .spd.on{color:var(--text);}

  .tickers{display:flex;gap:8px;flex-wrap:wrap;padding:8px 22px 0;max-height:120px;overflow-y:auto;}
  .ticker{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer;
    min-width:118px;transition:border-color .15s;}
  .ticker:hover,.ticker.sel{border-color:var(--algo);}
  .ticker .sym{font-size:11px;color:var(--muted);} .ticker .px{font-size:15px;font-weight:700;}

  main{display:grid;grid-template-columns:1fr 340px;gap:14px;padding:14px 22px 26px;}
  @media(max-width:960px){main{grid-template-columns:1fr;}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;}
  .panel+.panel{margin-top:14px;}
  .panel h2{margin:0 0 12px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    font-weight:600;display:flex;align-items:center;gap:8px;}
  .panel h2 .tag{font-size:9px;color:var(--algo);border:1px solid var(--algo-glow);border-radius:4px;
    padding:1px 5px;letter-spacing:.1em;}
  .full{grid-column:1/-1;}
  canvas{width:100%;height:240px;display:block;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:right;padding:8px;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  td.num,th.num{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  th{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  tbody tr:last-child td{border-bottom:none;}

  form{display:flex;flex-direction:column;gap:11px;}
  .auto{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:9px;
    background:var(--raise);margin-bottom:13px;cursor:pointer;}
  .auto .sw{width:38px;height:21px;border-radius:11px;background:var(--line2);position:relative;flex:none;transition:background .2s;}
  .auto .sw::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;
    background:#aeb6c4;transition:.2s;}
  .auto.on .sw{background:var(--algo-deep);} .auto.on .sw::after{left:19px;background:#eafff9;}
  .auto .t{font-size:12px;line-height:1.35;} .auto .t b{color:var(--algo);font-weight:600;}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{flex:1;background:var(--raise);color:var(--muted);border:none;padding:9px;cursor:pointer;
    font-size:13px;font-family:var(--sans);transition:.12s;}
  .seg button.on-buy{background:var(--up);color:#fff;} .seg button.on-sell{background:var(--down);color:#fff;}
  .seg button.on{background:var(--algo);color:var(--ink);font-weight:600;}
  label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;}
  input,select{width:100%;background:var(--field);border:1px solid var(--line);color:var(--text);padding:10px;
    border-radius:8px;font-size:14px;font-family:var(--mono);}
  input:focus,select:focus{outline:none;border-color:var(--algo);box-shadow:0 0 0 3px var(--algo-glow);}
  .submit{padding:12px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;color:#fff;letter-spacing:.04em;}
  .submit.buy{background:var(--up);} .submit.sell{background:var(--down);}
  #orderMsg{font-size:12px;min-height:16px;}
  .pill{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;letter-spacing:.05em;}
  .pill.BUY{background:rgba(246,70,93,.14);color:var(--up);}
  .pill.SELL{background:rgba(77,141,255,.14);color:var(--down);}
  .pill.FILLED{background:var(--algo-glow);color:var(--algo);}
  .pill.PENDING{background:var(--algo-glow);color:var(--algo);}
  .pill.REJECTED{background:var(--raise);color:var(--muted);}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span><b>coin·<span>auto</span>·trader</b></div>
  <div class="kpi"><span class="lbl">계정</span><span class="v num" id="acctId">-</span></div>
  <div class="kpi"><span class="lbl">평가자산</span><span class="v big num" id="equity">-</span></div>
  <div class="kpi"><span class="lbl">현금</span><span class="v num" id="krw">-</span></div>
  <div class="kpi"><span class="lbl">순손익 (수수료 반영)</span><span class="v big num" id="totalPnl">-</span></div>
  <div class="kpi"><span class="lbl">누적 수수료</span><span class="v num" id="fees">-</span></div>
  <div class="sp"></div>
  <div class="live" id="status">연결 중…</div>
  <span class="num muted" id="updated" style="font-size:11px">-</span>
  <button class="icon-btn" id="themeToggle" title="라이트/다크 전환">☀️</button>
  <a id="logout" href="/logout" style="display:none">로그아웃</a>
</header>

<section class="stance">
  <div class="stance-head"><span class="lbl">앙상블 스탠스</span>
    <span class="sub num" id="stanceSub">모델 2026-06-20(데이터 2019-11~2026-06) · 일봉 3속도 · band 0.5</span></div>
  <div class="rails" id="rails"><div class="muted" style="padding:8px">전략 상태 로딩…</div></div>
</section>

<div class="tickers" id="tickers"></div>

<main>
  <div>
    <div class="panel">
      <h2><span id="chartSym">-</span> · 1분봉 종가 <span class="tag">최근 2시간</span></h2>
      <canvas id="chart"></canvas>
    </div>
    <div class="panel">
      <h2>보유 포지션</h2>
      <table>
        <thead><tr><th>종목</th><th class="num">수량</th><th class="num">평균가</th><th class="num">현재가</th>
          <th class="num">평가금액</th><th class="num">손익</th></tr></thead>
        <tbody id="positions"><tr><td colspan="6" class="muted">없음</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <h2>주문</h2>
    <div class="auto" id="autoBox"><span class="sw"></span>
      <span class="t"><b>자동매매</b> — 켜면 봇이 내 계정으로 매매 <span class="muted">(현재 SMA 트레이더)</span></span></div>
    <form id="orderForm">
      <div><label>종목</label><select id="oSymbol"></select></div>
      <div class="seg" id="sideSeg">
        <button type="button" data-side="BUY" class="on-buy">매수</button>
        <button type="button" data-side="SELL">매도</button></div>
      <div class="seg" id="typeSeg">
        <button type="button" data-type="MARKET" class="on">시장가</button>
        <button type="button" data-type="LIMIT">지정가</button></div>
      <div><label>수량</label><input id="oQty" type="number" step="any" min="0" placeholder="0.001" /></div>
      <div id="priceWrap" style="display:none"><label>지정가 (원)</label>
        <input id="oPrice" type="number" step="any" min="0" placeholder="가격" /></div>
      <button type="submit" class="submit buy" id="submitBtn">매수 주문</button>
      <div id="orderMsg"></div>
    </form>
  </div>

  <div class="panel full">
    <h2>최근 체결</h2>
    <table>
      <thead><tr><th>시각 KST</th><th>종목</th><th>구분</th><th class="num">체결가</th><th class="num">수량</th><th class="num">수수료</th></tr></thead>
      <tbody id="execs"><tr><td colspan="6" class="muted">없음</td></tr></tbody>
    </table>
  </div>
</main>

<script>
let prices = {}, prevPrices = {}, side = "BUY", otype = "MARKET", chartSym = null, candleData = [];

const fmtTime = iso => new Date(iso).toLocaleString("ko-KR", { timeZone:"Asia/Seoul", hour12:false });
const won = n => "₩" + Math.round(n).toLocaleString("ko-KR");
const px = n => n == null ? "-" : n.toLocaleString("ko-KR", { maximumFractionDigits: n < 100 ? 4 : 0 });
const setStatus = (cls, txt) => { const e = document.getElementById("status"); e.className = "live " + cls; e.textContent = txt; };
const cssv = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

async function api(path, opts){ const r = await fetch(path, opts); if(!r.ok) throw new Error(path+" "+r.status); return r.json(); }

// ── 테마 ──
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("theme", t);
  document.getElementById("themeToggle").textContent = t === "light" ? "🌙" : "☀️";
  drawChart();
}
document.getElementById("themeToggle").onclick = () =>
  applyTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");

// ── 앙상블 스탠스(시그니처 레일) ──
function railHTML(d){
  const maxw = d.max_weight || 1;
  const w = Math.max(0, Math.min(100, Math.round(d.target_weight / maxw * 100)));
  const long = d.trend_state === "LONG";
  const price = prices[d.symbol];
  const spds = d.speeds.map(s => `<span class="spd ${s.state==='LONG'?'on':''}"><i></i>${s.short}/${s.long}</span>`).join("");
  return `<div class="rail ${long?'long':''}">
    <div class="rail-top"><span class="sym">${d.symbol}</span>
      <span class="price num">${price?won(price):'-'}</span>
      <span class="state ${d.trend_state}">${d.trend_state}</span></div>
    <div class="track"><div class="ticks"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="fill" data-w="${w}"></div><div class="thumb" data-w="${w}"></div>
      ${w>0?`<span class="wtxt num">${w}%</span>`:''}</div>
    <div class="rail-foot"><span class="ends">cash ◄ 목표비중 ► full long</span>
      <div class="speeds">${spds}</div></div></div>`;
}
async function loadStrategy(){
  const box = document.getElementById("rails");
  try {
    const data = await api("/strategy/ensemble");
    if(!data.length){ box.innerHTML = `<div class="muted" style="padding:8px">유니버스 없음</div>`; return; }
    if(data[0].bar_ts) document.getElementById("stanceSub").textContent =
      `모델 2026-06-20(데이터 2019-11~) · 일봉 3속도 5/40·10/60·20/100 · band 0.5 · 최신봉 ${data[0].bar_ts}`;
    box.innerHTML = data.map(railHTML).join("");
    requestAnimationFrame(() => setTimeout(() => box.querySelectorAll(".fill,.thumb").forEach(el => {
      const w = +el.dataset.w;
      if(el.classList.contains("fill")) el.style.width = w + "%"; else el.style.left = w + "%";
    }), 60));
  } catch(e){
    box.innerHTML = `<div class="rail"><span class="muted">전략 데이터 없음 (ClickHouse·일봉 백필 확인)</span></div>`;
  }
}

// ── 시세 ticker ──
function renderTickers(){
  const box = document.getElementById("tickers");
  box.innerHTML = Object.keys(prices).sort().map(s => {
    const p = prices[s], pv = prevPrices[s];
    const dir = pv == null ? "" : (p > pv ? "up" : p < pv ? "down" : "");
    return `<div class="ticker ${s===chartSym?'sel':''}" data-sym="${s}">
      <div class="sym">${s}</div><div class="px num ${dir}">${px(p)}</div></div>`;
  }).join("");
  box.querySelectorAll(".ticker").forEach(el => el.onclick = () => {
    chartSym = el.dataset.sym; document.getElementById("chartSym").textContent = chartSym; loadChart(); renderTickers();
  });
}

async function loadMe(){
  try {
    const me = await api("/me");
    document.getElementById("acctId").textContent = me.email || me.account_id;
    if(me.auth_enabled) document.getElementById("logout").style.display = "inline";
  } catch(e){}
}
async function loadAuto(){
  try { const a = await api("/autotrade"); document.getElementById("autoBox").classList.toggle("on", a.enabled); }
  catch(e){}
}
async function loadAccount(){
  const a = await api("/account");
  document.getElementById("krw").textContent = won(a.krw_balance);
  let posValue = 0, cost = 0;
  const tb = document.getElementById("positions");
  if(!a.positions.length){ tb.innerHTML = `<tr><td colspan="6" class="muted">없음</td></tr>`; }
  else {
    tb.innerHTML = a.positions.map(p => {
      const cur = prices[p.symbol] ?? p.avg_buy_price, value = cur*p.quantity, c = p.avg_buy_price*p.quantity;
      const pnl = value-c, pct = c>0 ? pnl/c*100 : 0; posValue += value; cost += c;
      const cls = pnl>0?"up":pnl<0?"down":"";
      return `<tr><td>${p.symbol}</td><td class="num">${px(p.quantity)}</td><td class="num">${px(p.avg_buy_price)}</td>
        <td class="num">${px(cur)}</td><td class="num">${won(value)}</td>
        <td class="num ${cls}">${pnl>=0?"+":""}${won(pnl)} (${pct.toFixed(2)}%)</td></tr>`;
    }).join("");
  }
  const equity = a.krw_balance + posValue;
  document.getElementById("equity").textContent = won(equity);
  // 순손익 = 평가자산 − 초기자본. 수수료가 이미 차감된 잔고 기반이라 매수·매도 수수료·실현손실 전부 반영(정직한 손익).
  const netPnl = equity - (a.initial_balance ?? equity);
  const pct = a.initial_balance > 0 ? netPnl / a.initial_balance * 100 : 0;
  const pe = document.getElementById("totalPnl");
  pe.textContent = (netPnl>=0?"+":"") + won(netPnl) + ` (${pct.toFixed(2)}%)`;
  pe.className = "v big num " + (netPnl>0?"up":netPnl<0?"down":"");
  document.getElementById("fees").textContent = won(a.total_fees ?? 0);
}
async function loadExecs(){
  const rows = await api("/history/executions?limit=20");
  const tb = document.getElementById("execs");
  tb.innerHTML = rows.length ? rows.map(e =>
    `<tr><td class="num">${fmtTime(e.ts)}</td><td>${e.symbol}</td>
     <td><span class="pill ${e.side}">${e.side==="BUY"?"매수":"매도"}</span></td>
     <td class="num">${px(e.price)}</td><td class="num">${px(e.quantity)}</td><td class="num">${px(e.fee)}</td></tr>`
  ).join("") : `<tr><td colspan="6" class="muted">없음</td></tr>`;
}

// ── 차트(테마 인지) ──
async function loadChart(){ if(!chartSym) return; candleData = await api(`/market/candles/${chartSym}`); drawChart(); }
function drawChart(){
  const cv = document.getElementById("chart"); if(!cv) return;
  const dpr = devicePixelRatio||1, w = cv.clientWidth, h = cv.clientHeight;
  cv.width = w*dpr; cv.height = h*dpr;
  const ctx = cv.getContext("2d"); ctx.scale(dpr,dpr); ctx.clearRect(0,0,w,h);
  if(candleData.length < 2){ ctx.fillStyle = cssv("--muted"); ctx.font = "13px sans-serif"; ctx.fillText("데이터 수집 중…",12,24); return; }
  const closes = candleData.map(c=>c.close), lo = Math.min(...closes), hi = Math.max(...closes);
  const top = 12, bot = h-20, pad = 36;
  const x = i => pad + (w-pad-12)*i/(candleData.length-1);
  const y = v => bot - (bot-top)*(hi===lo?0.5:(v-lo)/(hi-lo));
  ctx.strokeStyle = cssv("--line"); ctx.fillStyle = cssv("--faint"); ctx.font = "10px ui-monospace";
  for(let g=0;g<=3;g++){ const v = lo+(hi-lo)*g/3, yy = y(v);
    ctx.beginPath(); ctx.moveTo(pad,yy); ctx.lineTo(w-12,yy); ctx.stroke(); ctx.fillText(px(v),2,yy-2); }
  const last = closes[closes.length-1], first = closes[0];
  const col = last>=first ? cssv("--up") : cssv("--down");
  ctx.beginPath(); candleData.forEach((c,i)=> i?ctx.lineTo(x(i),y(c.close)):ctx.moveTo(x(i),y(c.close)));
  ctx.strokeStyle = col; ctx.lineWidth = 1.6; ctx.stroke();
}

// ── 주문 폼 ──
function initForm(){
  document.querySelectorAll("#sideSeg button").forEach(b => b.onclick = () => {
    side = b.dataset.side;
    document.querySelectorAll("#sideSeg button").forEach(x => x.className = "");
    b.className = side==="BUY"?"on-buy":"on-sell";
    const sb = document.getElementById("submitBtn");
    sb.className = "submit " + (side==="BUY"?"buy":"sell");
    sb.textContent = (side==="BUY"?"매수":"매도") + " 주문";
  });
  document.querySelectorAll("#typeSeg button").forEach(b => b.onclick = () => {
    otype = b.dataset.type;
    document.querySelectorAll("#typeSeg button").forEach(x => x.className = "");
    b.className = "on";
    document.getElementById("priceWrap").style.display = otype==="LIMIT"?"block":"none";
  });
  document.getElementById("orderForm").onsubmit = async e => {
    e.preventDefault();
    const msg = document.getElementById("orderMsg");
    const body = { symbol: document.getElementById("oSymbol").value, side, type: otype,
      quantity: parseFloat(document.getElementById("oQty").value) };
    if(!body.quantity || body.quantity <= 0){ msg.className = "down"; msg.textContent = "수량을 입력하세요"; return; }
    if(otype === "LIMIT"){ body.price = parseFloat(document.getElementById("oPrice").value);
      if(!body.price){ msg.className = "down"; msg.textContent = "지정가를 입력하세요"; return; } }
    try {
      const r = await api("/orders", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
      msg.className = "muted"; msg.textContent = `접수됨: ${r.status} (${r.order_id.slice(0,8)})`; refresh();
    } catch(err){ msg.className = "down"; msg.textContent = "주문 실패: " + err.message; }
  };
  document.getElementById("autoBox").onclick = async () => {
    const box = document.getElementById("autoBox"), next = !box.classList.contains("on");
    box.classList.toggle("on", next);
    try { await api("/autotrade", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({enabled:next}) }); }
    catch(err){ box.classList.toggle("on", !next); }
  };
}

async function refresh(){
  try {
    prevPrices = prices; prices = await api("/market/prices");
    renderTickers();
    await Promise.all([loadAccount(), loadExecs()]);
    document.getElementById("updated").textContent =
      "갱신 " + new Date().toLocaleTimeString("ko-KR",{timeZone:"Asia/Seoul",hour12:false});
    setStatus("ok","실시간");
  } catch(e){ setStatus("err","연결 끊김"); }
}

async function boot(){
  applyTheme(localStorage.getItem("theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));
  initForm(); await loadMe(); await loadAuto();
  const syms = await api("/market/symbols");
  document.getElementById("oSymbol").innerHTML = syms.map(s => `<option>${s}</option>`).join("");
  chartSym = syms[0]; document.getElementById("chartSym").textContent = chartSym;
  await refresh(); await loadChart(); await loadStrategy();
  setInterval(refresh, 2000);
  setInterval(loadChart, 15000);
  setInterval(loadStrategy, 60000);   // 일봉 신호 — 저빈도 폴링
  setInterval(loadAuto, 5000);
  addEventListener("resize", drawChart);
}
boot();
</script>
