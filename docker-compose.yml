name: coin-auto-trader

# 앱 서비스 공통 설정 (profile: app). 컨테이너는 내부 네트워크 호스트로 접속.
x-app: &app
  build: .
  image: coin-auto-trader-app
  restart: unless-stopped
  profiles: ["app"]
  environment:
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    POSTGRES_HOST: postgres
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
    WEB_USER: ${WEB_USER:-admin}
    WEB_PASSWORD: ${WEB_PASSWORD:-}
    GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
    SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-change-me}
    SITE_ADDRESS: ${SITE_ADDRESS:-}
    INITIAL_BALANCE: ${INITIAL_BALANCE:-10000000}
  depends_on:
    kafka:
      condition: service_healthy
    postgres:
      condition: service_healthy
    clickhouse:
      condition: service_healthy
    db-init:
      condition: service_completed_successfully

services:
  # ── Kafka (KRaft 단일 노드, Zookeeper 없음) ─────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"   # host(EXTERNAL) → localhost:9092 (루프백만 노출)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  # ── 토픽 자동 생성 (1회 실행 후 종료) ──────────────────────────────
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic market.ticks --partitions 6 --replication-factor 1 --config retention.ms=86400000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic orders --partitions 6 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic executions --partitions 6 --replication-factor 1 --config retention.ms=604800000
        echo "===== topics ====="
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list
    restart: "no"

  # ── PostgreSQL (OLTP: 잔고/주문/포지션) ────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      POSTGRES_DB: ${POSTGRES_DB:-coin_trading}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-coin_trading}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── ClickHouse (OLAP: 틱/캔들/분석) ────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"   # HTTP (루프백만 노출, native 9000은 미사용이라 비노출)
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-coin_analytics}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Grafana (대시보드) ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - clickhouse
      - postgres
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./dashboard/grafana/provisioning:/etc/grafana/provisioning
      - ./dashboard/grafana/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── 앱 서비스 (profile: app — 풀스택/VM 실행) ──────────────────────
  db-init:
    <<: *app
    container_name: db-init
    command: python -m scripts.init_db
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  ingester:
    <<: *app
    container_name: ingester
    command: python -m ingester.upbit_ws

  sink:
    <<: *app
    container_name: sink
    command: python -m sink.tick_clickhouse

  candle:
    <<: *app
    container_name: candle
    command: python -m aggregator.candle

  engine:
    <<: *app
    container_name: engine
    command: python -m engine.matching

  portfolio:
    <<: *app
    container_name: portfolio
    command: python -m portfolio.updater

  relay:
    <<: *app
    container_name: relay
    command: python -m relay.order_relay

  api:
    <<: *app
    container_name: api
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      # 외부 공개는 Caddy(HTTPS)가 담당. api 자체는 루프백만 바인딩(SSH 터널용).
      - "${API_BIND:-127.0.0.1}:8000:8000"

  # ── Caddy 리버스프록시 (HTTPS 종단 → api:8000) ─────────────────────
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    profiles: ["app"]
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      # 공개 도메인 지정 시 자동 HTTPS, 미설정 시 :80(평문) — infra/Caddyfile 참고
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data        # 발급된 인증서 영속(재시작 시 재발급 방지)
      - caddyconfig:/config

volumes:
  kafkadata:
  pgdata:
  chdata:
  grafanadata:
  caddydata:
  caddyconfig:
