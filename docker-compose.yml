name: coin-auto-trader

# 앱 서비스 공통 설정 (profile: app). 컨테이너는 내부 네트워크 호스트로 접속.
x-app: &app
  build: .
  image: coin-auto-trader-app
  restart: unless-stopped
  profiles: ["app"]
  environment:
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    POSTGRES_HOST: postgres
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
    WEB_USER: ${WEB_USER:-admin}
    WEB_PASSWORD: ${WEB_PASSWORD:-}
    GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
    SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-change-me}
    SITE_ADDRESS: ${SITE_ADDRESS:-}
    INITIAL_BALANCE: ${INITIAL_BALANCE:-10000000}
    SUBSCRIBE_ALL_KRW: ${SUBSCRIBE_ALL_KRW:-false}
    SMA_SHORT: ${SMA_SHORT:-7}
    SMA_LONG: ${SMA_LONG:-25}
    STRATEGY_ORDER_FRACTION_MIN: ${STRATEGY_ORDER_FRACTION_MIN:-0.05}
    STRATEGY_ORDER_FRACTION_MAX: ${STRATEGY_ORDER_FRACTION_MAX:-0.20}
    STRATEGY_STRONG_GAP: ${STRATEGY_STRONG_GAP:-0.015}
    STRATEGY_MAX_POSITIONS: ${STRATEGY_MAX_POSITIONS:-10}
    STRATEGY_COOLDOWN_SEC: ${STRATEGY_COOLDOWN_SEC:-15}
    STRATEGY_STOP_LOSS_PCT: ${STRATEGY_STOP_LOSS_PCT:-1.2}
    STRATEGY_TAKE_PROFIT_PCT: ${STRATEGY_TAKE_PROFIT_PCT:-2.0}
    STRATEGY_TRAIL_ARM_PCT: ${STRATEGY_TRAIL_ARM_PCT:-0.8}
    STRATEGY_TRAIL_GIVEBACK_PCT: ${STRATEGY_TRAIL_GIVEBACK_PCT:-0.5}
    STRATEGY_ENTRY_BAND: ${STRATEGY_ENTRY_BAND:-0.0015}
    STRATEGY_CONFIRM_TICKS: ${STRATEGY_CONFIRM_TICKS:-2}
    STRATEGY_MIN_HOLD_SEC: ${STRATEGY_MIN_HOLD_SEC:-20}
    STRATEGY_WARMUP_SEC: ${STRATEGY_WARMUP_SEC:-30}
    STOCK_SYMBOLS: ${STOCK_SYMBOLS:-005930,000660}
    KIWOOM_MOCK: ${KIWOOM_MOCK:-true}
    KIWOOM_APP_KEY: ${KIWOOM_APP_KEY:-}
    KIWOOM_APP_SECRET: ${KIWOOM_APP_SECRET:-}
    KIWOOM_ACCOUNT_NO: ${KIWOOM_ACCOUNT_NO:-}
  depends_on:
    kafka:
      condition: service_healthy
    postgres:
      condition: service_healthy
    clickhouse:
      condition: service_healthy
    db-init:
      condition: service_completed_successfully

services:
  # ── Kafka (KRaft 단일 노드, Zookeeper 없음) ─────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"   # host(EXTERNAL) → localhost:9092 (루프백만 노출)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  # ── 토픽 자동 생성 (1회 실행 후 종료) ──────────────────────────────
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic market.ticks --partitions 6 --replication-factor 1 --config retention.ms=86400000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic stock.ticks --partitions 6 --replication-factor 1 --config retention.ms=86400000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic orders --partitions 6 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic executions --partitions 6 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic strategy.signals --partitions 6 --replication-factor 1 --config retention.ms=604800000
        echo "===== topics ====="
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list
    restart: "no"

  # ── PostgreSQL (OLTP: 잔고/주문/포지션) ────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    ports:
      # 기본 loopback(로컬 개발). 데이터 VM은 .env DB_BIND=<사설IP>로 온디맨드 매매 VM에 노출(VPC 내부만).
      - "${DB_BIND:-127.0.0.1}:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      POSTGRES_DB: ${POSTGRES_DB:-coin_trading}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-coin_trading}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── ClickHouse (OLAP: 틱/캔들/분석) ────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "${DB_BIND:-127.0.0.1}:8123:8123"   # HTTP. 기본 loopback; 데이터 VM은 DB_BIND=<사설IP>(VPC 내부만). native 9000 비노출
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-coin_analytics}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Grafana (대시보드) ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - clickhouse
      - postgres
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./dashboard/grafana/provisioning:/etc/grafana/provisioning
      - ./dashboard/grafana/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── 앱 서비스 (profile: app — 풀스택/VM 실행) ──────────────────────
  db-init:
    <<: *app
    container_name: db-init
    profiles: ["app", "data"]    # 데이터 VM도 스키마(pg/ch) 필요
    command: python -m scripts.init_db
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  ingester:
    <<: *app
    container_name: ingester
    profiles: ["app", "data"]
    command: python -m streaming.ingester.upbit_ws

  sink:
    <<: *app
    container_name: sink
    profiles: ["app", "data"]
    command: python -m streaming.sink.tick_clickhouse

  # 주식(키움) 데이터 경로 (7단계) — 코인 ingester/sink와 동일 패턴, 별도 토픽/테이블
  stock-ingester:
    <<: *app
    container_name: stock-ingester
    profiles: ["app", "data"]
    command: python -m streaming.ingester.stock_kiwoom

  stock-sink:
    <<: *app
    container_name: stock-sink
    profiles: ["app", "data"]
    command: python -m streaming.sink.stock_tick_clickhouse

  candle:
    <<: *app
    container_name: candle
    profiles: ["app", "data"]
    command: python -m streaming.aggregator.candle

  daily-aggregator:
    <<: *app
    container_name: daily-aggregator
    profiles: ["app", "data"]
    command: python -m streaming.aggregator.daily        # candles_1m → candles_1d 일봉 리샘플(매일 최신화)

  engine:
    <<: *app
    container_name: engine
    command: python -m trading.engine.matching

  portfolio:
    <<: *app
    container_name: portfolio
    command: python -m trading.portfolio.updater

  # 라이브 앙상블 파이프라인 (sma_trader 대체 — 이중 매매 방지로 단일 자동매매 경로 유지)
  ensemble-signals:
    <<: *app
    container_name: ensemble-signals
    command: python -m trading.strategy.live_ensemble    # candles_1d 워밍업 → 일봉 마감마다 strategy.signals 발행

  commander:
    <<: *app
    container_name: commander
    command: python -m trading.strategy.commander        # strategy.signals 소비 → 목표비중 모의주문(place_order)

  relay:
    <<: *app
    container_name: relay
    command: python -m trading.relay.order_relay

  # ── 부하 재평가 배치 (profile: batch — 온디맨드, backtest 포함 이미지) ──
  # 라이브와 분리: `docker compose run --rm reeval python -m batch.backtest.reeval_weights [--dry-run]`.
  # Cloud Scheduler가 온디맨드 VM을 기동해 주기 실행한다(Airflow 미도입). kafka 불요(postgres+clickhouse만).
  reeval:
    build:
      context: .
      dockerfile: Dockerfile.batch
    image: coin-auto-trader-batch
    profiles: ["batch"]
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
      INITIAL_BALANCE: ${INITIAL_BALANCE:-10000000}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: python -m batch.backtest.reeval_weights

  # ── 온디맨드 1회 매매 (profile: trade — 매매 VM에서 스케줄러로 기동) ──
  # 메인 앱 이미지(portfolio/strategy/common 포함, backtest 불요). DB 접근=SSH 터널:
  # 매매 VM 호스트가 데이터 VM으로 -L 5432/8123 터널을 열고, network_mode:host로 컨테이너가 127.0.0.1(터널)에 접속.
  # (사설IP 직접노출 대신 터널 — DB는 데이터 VM에서 loopback 유지). depends_on 없음(원격 DB).
  trade-once:
    image: coin-auto-trader-app
    build: .
    profiles: ["trade"]
    restart: "no"
    network_mode: host
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-127.0.0.1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-127.0.0.1}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
      INITIAL_BALANCE: ${INITIAL_BALANCE:-10000000}
    command: python -m trading.strategy.trade_once

  api:
    <<: *app
    container_name: api
    profiles: ["app", "data"]
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      # 외부 공개는 Caddy(HTTPS)가 담당. api 자체는 루프백만 바인딩(SSH 터널용).
      - "${API_BIND:-127.0.0.1}:8000:8000"

  # ── Caddy 리버스프록시 (HTTPS 종단 → api:8000) ─────────────────────
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    profiles: ["app", "data"]
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      # 공개 도메인 지정 시 자동 HTTPS, 미설정 시 :80(평문) — infra/Caddyfile 참고
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data        # 발급된 인증서 영속(재시작 시 재발급 방지)
      - caddyconfig:/config

volumes:
  kafkadata:
  pgdata:
  chdata:
  grafanadata:
  caddydata:
  caddyconfig:
