name: coin-auto-trader   # 레거시 프로젝트명 유지 — 볼륨 prefix(pgdata 등) 보존, 리네임 시 라이브 데이터 고아화

# 도커 로그 로테이션 공통 설정 — 미지정 시 json-file 무제한 누적 → 24/7 수집 VM 디스크 고갈(수집 중단).
x-logging: &logging
  driver: json-file
  options: { max-size: "20m", max-file: "3" }

# 앱 서비스 공통 설정 (profile: app). 컨테이너는 내부 네트워크 호스트로 접속.
# image: = CI(deploy.yml)가 굽는 Artifact Registry 참조 — VM은 pull, 로컬 dev는 build:가 같은 태그로 빌드.
x-app: &app
  build: .
  image: us-central1-docker.pkg.dev/coin-auto-trader-jvfhgq/docker/quant-trader-app:latest
  restart: unless-stopped
  profiles: ["app"]
  logging: *logging
  environment:
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    POSTGRES_HOST: postgres
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
    GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
    SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-change-me}
    SITE_ADDRESS: ${SITE_ADDRESS:-}
    INITIAL_BALANCE: ${INITIAL_BALANCE:-10000000}
    SUBSCRIBE_ALL_KRW: ${SUBSCRIBE_ALL_KRW:-false}
    SMA_SHORT: ${SMA_SHORT:-7}
    SMA_LONG: ${SMA_LONG:-25}
    STRATEGY_ORDER_FRACTION_MIN: ${STRATEGY_ORDER_FRACTION_MIN:-0.05}
    STRATEGY_ORDER_FRACTION_MAX: ${STRATEGY_ORDER_FRACTION_MAX:-0.20}
    STRATEGY_STRONG_GAP: ${STRATEGY_STRONG_GAP:-0.015}
    STRATEGY_MAX_POSITIONS: ${STRATEGY_MAX_POSITIONS:-10}
    STRATEGY_COOLDOWN_SEC: ${STRATEGY_COOLDOWN_SEC:-15}
    STRATEGY_STOP_LOSS_PCT: ${STRATEGY_STOP_LOSS_PCT:-1.2}
    STRATEGY_TAKE_PROFIT_PCT: ${STRATEGY_TAKE_PROFIT_PCT:-2.0}
    STRATEGY_TRAIL_ARM_PCT: ${STRATEGY_TRAIL_ARM_PCT:-0.8}
    STRATEGY_TRAIL_GIVEBACK_PCT: ${STRATEGY_TRAIL_GIVEBACK_PCT:-0.5}
    STRATEGY_ENTRY_BAND: ${STRATEGY_ENTRY_BAND:-0.0015}
    STRATEGY_CONFIRM_TICKS: ${STRATEGY_CONFIRM_TICKS:-2}
    STRATEGY_MIN_HOLD_SEC: ${STRATEGY_MIN_HOLD_SEC:-20}
    STRATEGY_WARMUP_SEC: ${STRATEGY_WARMUP_SEC:-30}
    STOCK_SYMBOLS: ${STOCK_SYMBOLS:-005930,000660}
    KIWOOM_MOCK: ${KIWOOM_MOCK:-true}
    KIWOOM_APP_KEY: ${KIWOOM_APP_KEY:-}
    KIWOOM_APP_SECRET: ${KIWOOM_APP_SECRET:-}
    KIS_MOCK: ${KIS_MOCK:-true}
    KIS_APPKEY: ${KIS_APPKEY:-}
    KIS_APPSECRET: ${KIS_APPSECRET:-}
    KIS_ACCOUNT_NO: ${KIS_ACCOUNT_NO:-}
    # 수동주문 실패 텔레그램 통보용(api의 stock_order_executor) — 미설정 시 발송만 조용히 스킵.
    TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
    TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    TELEGRAM_SESSION: ${TELEGRAM_SESSION:-}
    TELEGRAM_TARGET: ${TELEGRAM_TARGET:-me}
  depends_on:
    kafka:
      condition: service_healthy
    postgres:
      condition: service_healthy
    clickhouse:
      condition: service_healthy
    db-init:
      condition: service_completed_successfully

# 온디맨드 주식 매매 공통 설정 (profile: trade — 매매 VM, batch 이미지). KR/US가 command만 다름.
# DB 접근=매매 VM 로컬 postgres/clickhouse(127.0.0.1) + network_mode:host(자기완결, 크로스VM 터널 없음). KIS 자격증명은 VM .env 주입.
x-batch-trade: &batch-trade
  build:
    context: .
    dockerfile: Dockerfile.batch
  image: us-central1-docker.pkg.dev/coin-auto-trader-jvfhgq/docker/quant-trader-batch:latest
  profiles: ["trade"]
  restart: "no"
  network_mode: host
  logging: *logging
  environment:
    POSTGRES_HOST: ${POSTGRES_HOST:-127.0.0.1}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
    CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-127.0.0.1}
    CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
    KIS_APPKEY: ${KIS_APPKEY:-}
    KIS_APPSECRET: ${KIS_APPSECRET:-}
    KIS_ACCOUNT_NO: ${KIS_ACCOUNT_NO:-}
    KIS_MOCK: ${KIS_MOCK:-true}
    TOSS_CLIENT_ID: ${TOSS_CLIENT_ID:-}
    TOSS_CLIENT_SECRET: ${TOSS_CLIENT_SECRET:-}
    DART_API_KEY: ${DART_API_KEY:-}
    # 연구 데이터 지속 수집(maintenance_once의 KRX·FRED 스텝)용 — 미설정 시 해당 스텝만 🔴
    KRX_ID: ${KRX_ID:-}
    KRX_PW: ${KRX_PW:-}
    FRED_API_KEY: ${FRED_API_KEY:-}
    TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
    TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    TELEGRAM_SESSION: ${TELEGRAM_SESSION:-}
    TELEGRAM_TARGET: ${TELEGRAM_TARGET:-me}
  volumes:                          # 참조캐시·분기 zip 영속 — 월간 콜드 스타트 방지(#218).
    - refcache:/app/batch/.refcache             # cusip_map·corp_map·sic_map (불변 참조)
    - cache13f:/app/batch/rawdata/.13f_cache       # 13F 분기 zip (확정분기 불변)
    - insidercache:/app/batch/rawdata/.insider_cache
    # .edgar_cache(companyfacts)·.dart_cache(보고서)는 콜드 — SEC 조건부GET 미지원·정정 반영 위해 매월 재수신

services:
  # ── Kafka (KRaft 단일 노드, Zookeeper 없음) ─────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    logging: *logging
    ports:
      - "127.0.0.1:9092:9092"   # host(EXTERNAL) → localhost:9092 (루프백만 노출)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # e2-small(2GB)에서 CH·PG·파이썬 스트림과 공존 — 미설정 시 kafka-server-start.sh 기본
      # -Xmx1G -Xms1G가 RAM 절반을 선점해 스왑 스래싱 → 데이터플레인 행(2026-07-18 38h 정지 사고).
      # 단일노드 저부하(틱 수십 msg/s·6파티션)엔 512m 충분. apache/kafka 이미지의 예약 env(JVM 직전달).
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  # ── 토픽 자동 생성 (1회 실행 후 종료) ──────────────────────────────
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: kafka-init
    logging: *logging
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic market.ticks --partitions 6 --replication-factor 1 --config retention.ms=86400000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic stock.ticks --partitions 6 --replication-factor 1 --config retention.ms=86400000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic orders --partitions 6 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic executions --partitions 6 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic strategy.signals --partitions 6 --replication-factor 1 --config retention.ms=604800000
        echo "===== topics ====="
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list
    restart: "no"

  # ── PostgreSQL (OLTP: 잔고/주문/포지션) ────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    logging: *logging
    ports:
      # 기본 loopback 고정 — 매매 VM은 자기완결(로컬 DB)이라 크로스 VM 노출 없음. DB_BIND는 로컬 개발 오버라이드용.
      - "${DB_BIND:-127.0.0.1}:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      POSTGRES_DB: ${POSTGRES_DB:-coin_trading}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-coin_trading}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── ClickHouse (OLAP: 틱/캔들/분석) ────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    restart: unless-stopped
    logging: *logging
    ports:
      - "${DB_BIND:-127.0.0.1}:8123:8123"   # HTTP. 기본 loopback 고정(매매 VM 자기완결 — 크로스 VM 노출 없음). native 9000 비노출
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-coin_analytics}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - chdata:/var/lib/clickhouse
      - ./db/clickhouse_system_logs.xml:/etc/clickhouse-server/config.d/system_logs.xml:ro   # system 로그 최소화(에러 7일·프로파일링 비활성 — #302)
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Grafana (대시보드) ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    logging: *logging
    profiles: ["app", "data"]   # collector VM 제외(대시보드 불요 — 메모리 절약)
    depends_on:
      - clickhouse
      - postgres
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./dashboard/grafana/provisioning:/etc/grafana/provisioning
      - ./dashboard/grafana/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── 앱 서비스 (profile: app — 풀스택/VM 실행) ──────────────────────
  db-init:
    <<: *app
    container_name: db-init
    profiles: ["app", "data", "collector"]    # 데이터 VM·수집 VM 모두 스키마(pg/ch) 필요
    command: python -m scripts.init_db
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  ingester:
    <<: *app
    container_name: ingester
    profiles: ["app", "data", "collector"]
    command: python -m streaming.ingester.upbit_ws

  sink:
    <<: *app
    container_name: sink
    profiles: ["app", "data", "collector"]
    command: python -m streaming.sink.tick_clickhouse

  # ── 텔레그램 /차트 봇 (profile: collector — 수집 VM 상시. Bot API getUpdates는 단일 소비자만: 인스턴스 1개 엄수) ──
  # app 이미지(httpx+pillow). 주식 데이터는 Toss 온디맨드 fetch(수집 VM 로컬 CH엔 주식 없음). 로컬 DB·kafka 비접속.
  telegram-bot:
    <<: *app
    container_name: telegram-bot
    profiles: ["collector"]
    depends_on: []
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TOSS_CLIENT_ID: ${TOSS_CLIENT_ID:-}
      TOSS_CLIENT_SECRET: ${TOSS_CLIENT_SECRET:-}
    command: python -m api.telegram_bot   # 종목명 사전은 이미지 번들(common/marketdata/refdata) — 별도 캐시 볼륨 불요

  # 주식(키움) 데이터 경로 (7단계) — 코인 ingester/sink와 동일 패턴, 별도 토픽/테이블
  stock-ingester:
    <<: *app
    container_name: stock-ingester
    profiles: ["app", "data", "collector"]
    command: python -m streaming.ingester.stock_kiwoom

  stock-sink:
    <<: *app
    container_name: stock-sink
    profiles: ["app", "data", "collector"]
    command: python -m streaming.sink.stock_tick_clickhouse

  candle:
    <<: *app
    container_name: candle
    profiles: ["app", "data", "collector"]
    command: python -m streaming.aggregator.candle

  daily-aggregator:
    <<: *app
    container_name: daily-aggregator
    profiles: ["app", "data", "collector"]
    command: python -m streaming.aggregator.daily        # candles_1m → candles_1d 일봉 리샘플(매일 최신화)

  engine:
    <<: *app
    container_name: engine
    command: python -m trading.engine.matching

  portfolio:
    <<: *app
    container_name: portfolio
    command: python -m trading.portfolio.updater

  # 라이브 앙상블 파이프라인 (단일 자동매매 경로 — 이중 매매 방지)
  ensemble-signals:
    <<: *app
    container_name: ensemble-signals
    command: python -m trading.strategy.runners.live_ensemble    # candles_1d 워밍업 → 일봉 마감마다 strategy.signals 발행

  commander:
    <<: *app
    container_name: commander
    command: python -m trading.strategy.runners.commander        # strategy.signals 소비 → 목표비중 모의주문(place_order)

  relay:
    <<: *app
    container_name: relay
    command: python -m trading.relay.order_relay

  # ── 부하 재평가 배치 (profile: batch — 온디맨드, backtest 포함 이미지) ──
  # 라이브와 분리: `docker compose run --rm reeval python -m batch.jobs.reeval_weights [--dry-run]`.
  # 스케줄 미배선(수동 전용) — trade-vm-startup은 이 서비스를 backfill_daily 러너로만 재사용한다.
  # ENSEMBLE_ADAPTIVE=false 기본이라 라이브는 균등가중 운용(적응 루프는 휴면 설계 자산). kafka 불요(postgres+clickhouse만).
  reeval:
    build:
      context: .
      dockerfile: Dockerfile.batch
    image: us-central1-docker.pkg.dev/coin-auto-trader-jvfhgq/docker/quant-trader-batch:latest
    profiles: ["batch"]
    restart: "no"
    logging: *logging
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
      INITIAL_BALANCE: ${INITIAL_BALANCE:-10000000}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: python -m batch.jobs.reeval_weights

  # ── 온디맨드 1회 매매 (profile: trade — 매매 VM에서 스케줄러로 기동) ──
  # 메인 앱 이미지(portfolio/strategy/common 포함, backtest 불요). DB 접근=매매 VM 로컬 postgres/clickhouse(127.0.0.1):
  # startup이 로컬 DB를 먼저 기동(자기완결, 크로스VM 터널 없음), network_mode:host로 컨테이너가 127.0.0.1에 접속.
  # depends_on 없음(startup이 로컬 DB 기동·스키마를 선행).
  trade-once:
    image: us-central1-docker.pkg.dev/coin-auto-trader-jvfhgq/docker/quant-trader-app:latest
    build: .
    profiles: ["trade"]
    restart: "no"
    network_mode: host
    logging: *logging
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-127.0.0.1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-127.0.0.1}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
      INITIAL_BALANCE: ${INITIAL_BALANCE:-10000000}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION: ${TELEGRAM_SESSION:-}
      TELEGRAM_TARGET: ${TELEGRAM_TARGET:-me}
    command: python -m trading.strategy.runners.trade_once

  # ── 온디맨드 주식 주간 모의 리밸런싱 (평일 15:00 KST, 마감 30분 전) — ML 챔피언 스코어→KIS 모의주문 ──
  # 스타트업이 부팅시각(UTC 06·07)으로 분기 실행, 주간 마커가 주 1회 보장. 공통 설정은 x-batch-trade 앵커.
  stock-trade-once:
    <<: *batch-trade
    command: python -m trading.strategy.runners.stock_trade_once --live --top-n 10 --max-orders 5

  # ── 온디맨드 US 주간 모의 리밸런싱 (평일 15:00 ET, 마감 1시간 전) — KR판의 US 대응 ──
  # 차이: USD·해외 잔고/지정가주문(시장가 불가)·거래소 라우팅+체결추격. 스타트업이 UTC 부팅시각(19·20·21)으로만 실행.
  us-trade-once:
    <<: *batch-trade
    command: python -m trading.strategy.runners.us_trade_once --live --top-n 20 --max-orders 5

  # ── 온디맨드 KR 일목 주간 페이퍼 매매 (평일 15:00 KST, stock-trade-once 뒤) — 주봉 구름 신호 → Postgres 시뮬 체결 ──
  # 실계좌 없음: paper_ledger가 orders/executions/positions에 기록. 주간 마커 키 KR_ICHIMOKU(ML 'KR'과 격리). ML 전략과 자산곡선 비교용.
  kr-ichimoku-trade-once:
    <<: *batch-trade
    command: python -m trading.strategy.runners.kr_ichimoku_trade_once --live --max-positions 30

  # ── 온디맨드 데이터 유지보수 (매월 첫 토요일 04:00 UTC — 선별 재백필+분기 수집기+연구 수집기(KRX 증분·FRED·PIT 멤버십·상폐 메타), #204) ──
  maintenance-once:
    <<: *batch-trade
    command: python -m batch.jobs.maintenance_once

  # ── 자산 차트 렌더 (profile: trade — 매매 잡 후 startup이 실행, charts/*.svg 생성 → assets 브랜치 발행) ──
  # 앱 이미지(scripts/ 포함 — batch 이미지엔 없음). DB=매매 VM 로컬(127.0.0.1), 출력은 호스트 ./charts 바인드.
  equity-chart:
    image: us-central1-docker.pkg.dev/coin-auto-trader-jvfhgq/docker/quant-trader-app:latest
    build: .
    profiles: ["trade"]
    restart: "no"
    network_mode: host
    logging: *logging
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-127.0.0.1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-127.0.0.1}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
    volumes:
      - ./charts:/app/charts
    command: python -m scripts.render_equity_chart --out charts

  # ── 관심종목 데일리 차트 푸시 (profile: trade — 코인 분기(매일 10:00 KST)에서 startup이 실행) ──
  # app 이미지(pillow+telethon). 로컬 CH 우선/낡으면 Toss 폴백 → symbol_chart 렌더 → 유저세션 텔레그램 발송.
  watchlist-charts:
    image: us-central1-docker.pkg.dev/coin-auto-trader-jvfhgq/docker/quant-trader-app:latest
    build: .
    profiles: ["trade"]
    restart: "no"
    network_mode: host
    logging: *logging
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-127.0.0.1}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_pw}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-127.0.0.1}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch_pw}
      TOSS_CLIENT_ID: ${TOSS_CLIENT_ID:-}          # 로컬 CH에 없는/낡은 관심종목 봉 폴백
      TOSS_CLIENT_SECRET: ${TOSS_CLIENT_SECRET:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION: ${TELEGRAM_SESSION:-}
      TELEGRAM_TARGET: ${TELEGRAM_TARGET:-me}
    command: python -m common.chart.watchlist_chart_telegram

  api:
    <<: *app
    container_name: api
    profiles: ["app", "data"]
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      # 외부 공개는 Caddy(HTTPS)가 담당. api 자체는 루프백만 바인딩(SSH 터널용).
      - "${API_BIND:-127.0.0.1}:8000:8000"

  # ── Caddy 리버스프록시 (HTTPS 종단 → api:8000) ─────────────────────
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    logging: *logging
    profiles: ["app", "data"]
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      # 공개 도메인 지정 시 자동 HTTPS, 미설정 시 :80(평문) — infra/Caddyfile 참고
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data        # 발급된 인증서 영속(재시작 시 재발급 방지)
      - caddyconfig:/config

volumes:
  kafkadata:
  pgdata:
  chdata:
  refcache:        # #218 참조캐시(cusip_map·corp_map·sic_map) — 사실상 불변, 영속
  cache13f:        #       13F 분기 zip
  insidercache:    #       insider 분기 zip
  grafanadata:
  caddydata:
  caddyconfig:
